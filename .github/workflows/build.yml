name: Build, CI and Deploy to Vercel and AWS

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build check compile source
        run: python -m py_compile calculator.py

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-source
          path: |
            calculator.py
            tests/test_calculator.py
            README.md

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  deploy-vercel:
    runs-on: ubuntu-latest

    needs:
      - build
      - test

    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve Vercel org id
        id: resolve_org
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "Missing required secret: VERCEL_TOKEN"
            exit 1
          fi

          RESPONSE=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" https://api.vercel.com/v2/user)

          ORG_ID=$(printf '%s' "$RESPONSE" | python3 -c "import json,sys; p=json.load(sys.stdin); u=p.get('user',{}); print(u.get('defaultTeamId') or u.get('id') or '')")

          if [ -z "$ORG_ID" ]; then
            echo "Could not resolve Vercel org id from token"
            exit 1
          fi

          echo "org_id=$ORG_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ steps.resolve_org.outputs.org_id }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod

  deploy-aws:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    needs:
      - build
      - test

    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required AWS secrets
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          test -n "${AWS_REGION:-}" || (echo "Missing secret AWS_REGION" && exit 1)
          test -n "${AWS_ROLE_TO_ASSUME:-}" || (echo "Missing secret AWS_ROLE_TO_ASSUME" && exit 1)
          test -n "${AWS_S3_BUCKET:-}" || (echo "Missing secret AWS_S3_BUCKET" && exit 1)
          test -n "${AWS_CLOUDFRONT_DISTRIBUTION_ID:-}" || (echo "Missing secret AWS_CLOUDFRONT_DISTRIBUTION_ID" && exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-calculator-deploy
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload website files to S3
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          aws s3 sync . s3://${AWS_S3_BUCKET} \
            --delete \
            --exclude "*" \
            --include "index.html" \
            --include "styles.css" \
            --include "app.js"

      - name: Refresh CloudFront cache
        env:
          AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${AWS_CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"

      - name: Show AWS website URL
        env:
          AWS_SITE_URL: ${{ secrets.AWS_SITE_URL }}
        run: |
          if [ -n "${AWS_SITE_URL:-}" ]; then
            echo "AWS site deployed at: ${AWS_SITE_URL}"
          else
            echo "AWS deployment completed. Set AWS_SITE_URL repository secret for a friendly link."
          fi
