name: Build Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build check (compile source)
        run: python -m py_compile calculator.py

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-source
          path: |
            calculator.py
            tests/test_calculator.py
            README.md
