name: Vercel CD Pipeline

on:
  workflow_run:
    workflows:
      - Build Pipeline
    types:
      - completed

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check Python CI status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          BRANCH_NAME: ${{ github.event.workflow_run.head_branch }}
        run: |
          echo "Checking Python CI status for commit: $COMMIT_SHA"

          for i in {1..30}; do
            STATUS=$(gh run list \
              --workflow "Python CI" \
              --commit "$COMMIT_SHA" \
              --branch "$BRANCH_NAME" \
              --json status,conclusion \
              --jq '.[0] | "\(.status) \(.conclusion)"')

            echo "Python CI status: $STATUS"

            if echo "$STATUS" | grep -q "completed success"; then
              echo "Python CI passed."
              exit 0
            fi

            if echo "$STATUS" | grep -q "completed failure"; then
              echo "Python CI failed."
              exit 1
            fi

            if echo "$STATUS" | grep -q "completed cancelled"; then
              echo "Python CI was cancelled."
              exit 1
            fi

            echo "Python CI is not completed yet. Checking again..."
            sleep 10
          done

          echo "Python CI did not complete successfully in time."
          exit 1

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
